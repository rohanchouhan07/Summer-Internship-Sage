<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<style>
    .timetable{
        width: 50%;
        height: 100%;
        text-align: center;
        padding: auto;
        margin: auto;
        /* border-collapse: collapse; */
        color: rgb(0, 0, 0);
        border: 1PX solid black;

    }

</style>
<body >
    HOMEWORK
    <H3 class="timetable"> TIME TABLE</H3>
    <table class="timetable" border="1px" style="text-align: center;">
        <tr>
            <th></th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th></th>
            <th colspan="2">4</th>
            <th colspan="2">6</th>
        </tr>
        <tr>
            <th>Mon</th>
            <td>C++</td>
            <td>HTML</td>
            <td>CSS</td>
            <td rowspan="5"><b>B <br>R<br>E <br>A <br>K</b></td>

            <td colspan="2">JAVA</td> 
            <td colspan="2">C++</td>
        </tr>
        <tr>
            <th>Tue</th>
            <td rowspan="3">Hindi</td>
            <td colspan="2">WebDev</td>
            <td>C++</td>
            <td>HTML</td>
            <td>CSS</td>
            <td rowspan="2">OS</td>
        </tr>
        <tr>
            <th>Wed</th>
            <td colspan="2">C++</td>
            <td colspan="3">Django</td>
        </tr>
        <tr>
            <th>Thu</th>
            <td colspan="2">JAVA</td>
            <td>English</td>
            <td>Go</td>
            <td colspan="2">Network</td>
        </tr>
        <tr>
            <th>Fri</th>
            <td colspan="3">Data Science</td>
            <td colspan="2">C++</td>
            <td>Go</td>
            <td>Python</td>
        </tr>
    </table>
</body>
</html>
